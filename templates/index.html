<!DOCTYPE html>
<html>
<head>
<title>Campus Assistant Chatbot</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f0f2f5;
}

.container{
    width:500px;
    margin:40px auto;
    background:white;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
    overflow:hidden;
}

.header{
    background:#0d6efd;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

#chat{
    height:400px;
    overflow-y:auto;
    padding:15px;
    background:#fafafa;
}

.user{
    text-align:right;
    margin:10px;
}

.user span{
    background:#0d6efd;
    color:white;
    padding:10px;
    border-radius:15px;
    display:inline-block;
}

.bot{
    text-align:left;
    margin:10px;
}

.bot span{
    background:#e9ecef;
    padding:10px;
    border-radius:15px;
    display:inline-block;
}

.footer{
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:10px;
    font-size:16px;
}

button{
    margin-left:10px;
    padding:10px 20px;
    background:#0d6efd;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
Campus Assistant Chatbot
</div>

<div id="chat">

<div class="bot">
<span>
👋 Hello! Welcome to Campus Assistant.<br><br>
Ask me about:
<ul>
<li>Admission</li>
<li>Courses</li>
<li>Library</li>
<li>Fees</li>
<li>Contact</li>
</ul>
</span>
</div>

</div>

<div class="footer">

<input id="msg" placeholder="Type your question...">

<button onclick="send()">Send</button>

</div>

</div>

<script>

function send(){

let message=document.getElementById("msg").value;

if(message=="") return;

document.getElementById("chat").innerHTML+=
"<div class='user'><span>"+message+"</span></div>";

fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:"message="+encodeURIComponent(message)

})

.then(response=>response.text())

.then(data=>{

document.getElementById("chat").innerHTML+=
"<div class='bot'><span>"+data+"</span></div>";

document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight;

});

document.getElementById("msg").value="";

}

document.getElementById("msg").addEventListener("keypress",function(event){

if(event.key==="Enter")
send();

});

</script>

</body>
</html>
